name: venv_quiche3d  # CHANGED: renamed to match your newer env (optional, just consistency)

channels:
  - conda-forge      # CHANGED: moved conda-forge to top (more deterministic solves)
  - bioconda
  - defaults

dependencies:
  - python=3.9.23    # CHANGED: was "python>=3.7" → now pinned to exact working version

  - anndata=0.9.2    # CHANGED: was ">=0.7.6,<0.10.9" → pinned to working version
  - umap-learn=0.5.1 # unchanged (already pinned)

  - scikit-learn=1.6.1   # CHANGED: was ">=0.23.2" → pinned to working version
  - scikit-image=0.24.0  # CHANGED: was ">=0.19.2" → pinned

  - ipython=8.18.1       # CHANGED: was unpinned → pinned
  - ipykernel=6.30.1     # CHANGED: was unpinned → pinned

  - networkx=3.2.1       # CHANGED: was "2.7" → updated to version actually used in working env

  - statsmodels=0.14.5   # CHANGED: was ">=0.12.2" → pinned
  - scanpy=1.10.3        # CHANGED: was ">=1.8.1" → pinned

  - python-igraph=0.11.9 # CHANGED: was ">=0.9.6" → pinned (conda version; pip had igraph)

  - seaborn=0.13.2       # CHANGED: was ">=0.12.2" → pinned
  - numba=0.60.0         # CHANGED: was ">=0.53.0" → pinned
  - tqdm=4.67.1          # CHANGED: was unpinned → pinned

  - pip=25.2             # CHANGED: explicitly pinned pip (helps reproducibility)

  - r-base=4.3.3         # CHANGED: was "r==4.3" → exact version used
  - r-matrix=1.6_5       # CHANGED: previously unpinned
  - r-locfit=1.5_9.12    # CHANGED: previously unpinned
  - r-statmod=1.5.0      # CHANGED: previously unpinned
  - rpy2=3.5.11          # unchanged (already pinned)

  - scipy=1.12.0         # unchanged (already pinned)
  - shapely=2.0.7        # CHANGED: was unpinned → pinned

  - numpy=1.23.4         # unchanged (already pinned, and important for JAX compatibility)

  - pip:
      - sketchKH==0.1.2        # unchanged
      - squidpy==1.6.1         # pinned for stability
      - pertpy>=1.0            # CHANGED: 0.6.0 broke with newer JAX (jax.config import removed)

      # --- JAX ecosystem (FINAL COMPATIBLE SET) ---
      - jax==0.4.30            # CHANGED: 0.4.17 not installable; using available version
      - jaxlib==0.4.30         # CHANGED: must match jax exactly

      - flax==0.8.5            # CHANGED: 0.7.4 incompatible with jax 0.4.30
      - chex>=0.1.86           # CHANGED: 0.1.8 broke (jax.core.Shape removed)
      - optax>=0.2.2           # CHANGED: keep in sync with newer chex/jax

      # --- JAX ecosystem helpers (aligned upward, not frozen too old) ---
      - ott-jax>=0.4.6,<0.7    # CHANGED: avoid old bugs but prevent jump to breaking 0.6+ APIs
      - orbax-checkpoint>=0.5.16  # CHANGED: allow compatible updates with flax>=0.8
      - lineax>=0.0.4          # CHANGED: avoid too-old version conflicts
      - numpyro>=0.15.0        # CHANGED: allow compatibility with newer JAX

      - .

      # --- LOCAL PACKAGE ---
      # CHANGED: was "- ." → NON-reproducible
      # Replace with a fixed commit of your repo:
      # - git+https://<your-repo-url>.git@3e0411e7b

      # If you really want local install, keep:
      # - .
      # but then the env is NOT reproducible